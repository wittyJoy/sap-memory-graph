services:
  neo4j:
    image: neo4j:5-community
    container_name: sap-memory-neo4j
    ports:
      - "7474:7474"   # Web UI
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/memory123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
