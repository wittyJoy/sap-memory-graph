<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧠 记忆云海 | Memory Cloud</title>
    <style>
      :root {
        --bg: #0a0a1a;
        --panel: #111127;
        --border: #1a1a3a;
        --text: #e0e0f0;
        --dim: #6a6a8a;
        --accent: #00ffcc;
        --pink: #ff6b9d;
        --gold: #ffd93d;
        --blue: #4d96ff;
        --green: #6bcb77;
        --purple: #9b59b6;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      /* ---- 布局 ---- */
      body {
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
        height: 100vh;
      }

      .app {
        display: flex;
        height: 100vh;
      }

      .sidebar {
        width: 320px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }

      .main {
        flex: 1;
        position: relative;
      }

      /* ---- 侧栏 ---- */
      .sidebar header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .sidebar header h1 {
        font-size: 16px;
        font-weight: 600;
      }

      .stats {
        padding: 16px 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        border-bottom: 1px solid var(--border);
      }

      .stat-card {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        padding: 10px 12px;
        text-align: center;
      }

      .stat-val {
        font-size: 22px;
        font-weight: 700;
        color: var(--accent);
      }

      .stat-label {
        font-size: 11px;
        color: var(--dim);
        margin-top: 2px;
      }

      .search-box {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }

      .search-box input {
        width: 100%;
        background: #1a1a30;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        color: var(--text);
        font-size: 13px;
        outline: none;
      }

      .search-box input:focus {
        border-color: var(--accent);
      }

      .quintuples {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .quintuples::-webkit-scrollbar {
        width: 4px;
      }

      .quintuples::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .q-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .q-card:hover {
        border-color: var(--accent);
        background: rgba(0, 255, 204, 0.04);
      }

      .q-predicate {
        text-align: center;
        color: var(--accent);
        font-size: 12px;
        margin: 4px 0;
        opacity: 0.7;
        font-style: italic;
      }

      .q-entity {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .q-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .q-name {
        font-size: 13px;
        font-weight: 500;
      }

      .q-type {
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--dim);
      }

      /* ---- 控制栏 ---- */
      .controls {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
      }

      .btn {
        flex: 1;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: transparent;
        color: var(--text);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }

      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .btn.primary {
        background: rgba(0, 255, 204, 0.1);
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ---- 图谱区域 ---- */
      #graph-canvas {
        width: 100%;
        height: 100%;
      }

      /* ---- 提示浮窗 ---- */
      .tooltip {
        position: fixed;
        background: rgba(10, 10, 30, 0.95);
        border: 1px solid var(--accent);
        border-radius: 10px;
        padding: 14px 18px;
        max-width: 320px;
        pointer-events: none;
        z-index: 1000;
        backdrop-filter: blur(10px);
        display: none;
      }

      .tooltip h3 {
        font-size: 14px;
        margin-bottom: 6px;
        color: var(--accent);
      }

      .tooltip p {
        font-size: 12px;
        line-height: 1.5;
        color: var(--text);
      }

      /* ---- 图例 ---- */
      .legend {
        position: absolute;
        bottom: 16px;
        left: 16px;
        background: rgba(10, 10, 30, 0.85);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 16px;
        backdrop-filter: blur(8px);
        font-size: 11px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0;
      }

      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      /* ---- 状态栏 ---- */
      .status-bar {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(10, 10, 30, 0.85);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 16px;
        backdrop-filter: blur(8px);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .status-dot.online {
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
      }

      .status-dot.offline {
        background: #ff4444;
        box-shadow: 0 0 6px #ff4444;
      }

      /* ---- 添加记忆面板 ---- */
      .add-panel {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--panel);
        border: 1px solid var(--accent);
        border-radius: 16px;
        padding: 24px;
        width: 420px;
        display: none;
        z-index: 100;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }

      .add-panel h2 {
        font-size: 16px;
        margin-bottom: 16px;
      }

      .add-panel textarea {
        width: 100%;
        height: 60px;
        background: #1a1a30;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        color: var(--text);
        font-size: 13px;
        resize: none;
        outline: none;
      }

      .add-panel textarea:focus {
        border-color: var(--accent);
      }

      .add-panel label {
        font-size: 12px;
        color: var(--dim);
        display: block;
        margin-top: 10px;
      }

      .add-panel select {
        width: 100%;
        background: #1a1a30;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px;
        color: var(--text);
        font-size: 12px;
      }

      .add-panel .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 99;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <!-- 侧栏 -->
      <div class="sidebar">
        <header>
          <span>🧠</span>
          <h1>记忆云海 (GRAG)</h1>
        </header>
        <div class="stats">
          <div class="stat-card">
            <div class="stat-val" id="s-quintuples">-</div>

          </div>
          <div class="stat-card">

          </div>
          <div class="stat-card">

      <!-- 图谱主区域 -->
      <div class="main">

        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot" style="background: #00ffcc"></div>

          </div>
          <div class="legend-item">

    <!-- 浮窗 -->
    <div class="tooltip" id="tooltip"></div>

    <!-- 添加记忆面板 -->
    <div class="overlay" id="overlay"></div>
    <div class="add-panel" id="add-panel">
      <h2>➕ 添加五元组</h2>
      <label>主体</label>
      <input
        type="text"
        id="add-subj"
        style="
          width: 100%;
          background: #1a1a30;
          border: 1px solid var(--border);
          border-radius: 6px;

        "
        placeholder="小夜"
      />
      <div class="row">
        <div style="flex: 1">
          <label>主体类型</label>
          <select id="add-subj-type">
            <option value="person">人物</option>
            <option value="location">地点</option>
            <option value="organization">组织</option>
            <option value="item">物品</option>

            <option value="time">时间</option>

          </select>
        </div>
        <div style="flex: 1">
          <label>谓词</label>
          <input
            type="text"
            id="add-pred"
            style="
              width: 100%;

            placeholder="喜欢"
          />

      </div>
      <label>客体</label>
      <input
        type="text"
        id="add-obj"
        style="
          width: 100%;
          background: #1a1a30;
          border: 1px solid var(--border);
          border-radius: 6px;
          padding: 6px;
          color: var(--text);
          font-size: 13px;
        "
        placeholder="猫"
      />
      <label>客体类型</label>
      <select id="add-obj-type">
        <option value="person">人物</option>
        <option value="location">地点</option>
        <option value="organization">组织</option>
        <option value="item" selected>物品</option>
        <option value="concept">概念</option>
        <option value="time">时间</option>
        <option value="event">事件</option>
        <option value="activity">活动</option>
      </select>
      <div class="row">
        <button class="btn primary" id="add-confirm">确认</button>
        <button class="btn" id="add-cancel">取消</button>
      </div>
    </div>

    <script>
      // GRAG 前端：五元组侧栏 + 球面坐标 3D 意识海可视化
      const API = location.protocol + "//" + location.host;
      const canvas = document.getElementById("graph-canvas");
      const ctx = canvas.getContext("2d");

      // ==================== 球面坐标 3D 引擎（NagaAgent 风格）====================
      class SphericalCamera {
        constructor() {
          this.theta = 0.5;
          this.phi = 1.0;
          this.radius = 600;
          this.cx = 0;
          this.cy = 0;
          this.cz = 0;
        }
        project(x, y, z) {
          const sx = Math.sin(this.theta),
            cx = Math.cos(this.theta);
          const sy = Math.sin(this.phi),
            cy = Math.cos(this.phi);
          const rx = x - this.cx,
            ry = y - this.cy,
            rz = z - this.cz;
          const dx = rx * cx + rz * sx;
          const dz = -rx * sx + rz * cx;
          const dy = ry * cy - dz * sy;
          const dzz = ry * sy + dz * cy;
          const depth = dzz + this.radius;
          const scale = 700 / Math.max(depth, 1);
          return {
            x: canvas.w / 2 + dx * scale,
            y: canvas.h / 2 - dy * scale,
            scale,
            depth,
          };
        }
        rotateBy(dx, dy) {
          this.theta += dx * 0.005;
          this.phi = Math.max(
            0.1,
            Math.min(Math.PI - 0.1, this.phi + dy * 0.005),
          );
        }
        zoomBy(d) {
          this.radius = Math.max(100, Math.min(2000, this.radius + d));
        }
      }

      let nodes = [],
        edges = [],
        nodeMap = {};
      const cam = new SphericalCamera();
      const drag = { active: false, x: 0, y: 0 };
      let hover = null,
        selected = null,
        time = 0;
      const COLORS = {
        person: "#00ffcc",
        location: "#ff6b9d",
        organization: "#ffd93d",
        item: "#ffd93d",
        concept: "#4d96ff",
        time: "#6bcb77",
        event: "#6bcb77",
        activity: "#9b59b6",
      };

      function resize() {
        const r = canvas.parentElement.getBoundingClientRect();
        canvas.width = r.width * devicePixelRatio;
        canvas.height = r.height * devicePixelRatio;
        canvas.style.width = r.width + "px";
        canvas.style.height = r.height + "px";
        ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        canvas.w = r.width;
        canvas.h = r.height;
      }
      window.addEventListener("resize", resize);
      resize();

      canvas.addEventListener("mousedown", (e) => {
        drag.active = true;
        drag.x = e.clientX;
        drag.y = e.clientY;
      });
      window.addEventListener("mousemove", (e) => {
        if (drag.active) {
          cam.rotateBy(e.clientX - drag.x, e.clientY - drag.y);
          drag.x = e.clientX;
          drag.y = e.clientY;
        } else checkHover(e.clientX, e.clientY);
      });
      window.addEventListener("mouseup", () => (drag.active = false));
      canvas.addEventListener(
        "wheel",
        (e) => {
          cam.zoomBy(e.deltaY > 0 ? 50 : -50);
          e.preventDefault();
        },
        { passive: false },
      );
      canvas.addEventListener("click", () => {
        if (hover) selected = hover;
      });

      function checkHover(mx, my) {
        hover = null;
        let minD = 25;
        for (const n of nodes) {
          const p = cam.project(n.x, n.y, n.z);
          const d = Math.hypot(mx - p.x, my - p.y);
          const r = (n.importance || 5) * p.scale + 6;
          if (d < r && d < minD) {
            minD = d;
            hover = n;
          }
        }
        canvas.style.cursor = hover ? "pointer" : "grab";
        const tip = document.getElementById("tooltip");
        if (hover) {
          const p = cam.project(hover.x, hover.y, hover.z);
          tip.style.display = "block";
          tip.style.left = p.x + 15 + "px";
          tip.style.top = p.y - 10 + "px";
          tip.innerHTML = `<h3>${hover.name}</h3><p>类型: ${hover.label}</p><p>度中心性: ${hover.degree || 0}</p>`;
        } else tip.style.display = "none";
      }

      // ==================== 7 层渲染（NagaAgent 意识海风格）====================
      function draw() {
        time += 0.016;
        ctx.clearRect(0, 0, canvas.w, canvas.h);

        // Layer 1: 背景渐变
        const bg = ctx.createRadialGradient(
          canvas.w / 2,
          canvas.h / 2,
          0,
          canvas.w / 2,
          canvas.h / 2,
          canvas.w * 0.7,
        );
        bg.addColorStop(0, "#0d0d24");
        bg.addColorStop(0.5, "#080818");
        bg.addColorStop(1, "#030310");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.w, canvas.h);

        // Layer 2: 地面网格
        ctx.strokeStyle = "rgba(0,255,204,0.04)";
        ctx.lineWidth = 0.5;
        for (let i = -500; i <= 500; i += 50) {
          const p1 = cam.project(i, 150, -500),
            p2 = cam.project(i, 150, 500);
          const p3 = cam.project(-500, 150, i),
            p4 = cam.project(500, 150, i);
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(p3.x, p3.y);
          ctx.lineTo(p4.x, p4.y);
          ctx.stroke();
        }

        // Layer 3: 水面平面（半透明）
        ctx.fillStyle = "rgba(0,100,200,0.03)";
        ctx.fillRect(0, canvas.h * 0.6, canvas.w, canvas.h * 0.4);

        // Layer 4: 体积光（3 束光柱）
        for (let i = 0; i < 3; i++) {
          const angle = time * 0.1 + i * 2.1;
          const lx = canvas.w * (0.3 + 0.4 * Math.sin(angle));
          const grad = ctx.createLinearGradient(lx, 0, lx, canvas.h);
          grad.addColorStop(
            0,
            `rgba(0,255,204,${0.02 + Math.sin(time + i) * 0.01})`,
          );
          grad.addColorStop(1, "rgba(0,255,204,0)");
          ctx.fillStyle = grad;
          ctx.fillRect(lx - 30, 0, 60, canvas.h);
        }

        // Layer 5: 粒子系统（3 层 125 颗）
        for (let layer = 0; layer < 3; layer++) {
          const count = 40 + layer * 5;
          for (let i = 0; i < count; i++) {
            const px =
              (Math.sin(i * 127.1 + layer * 50 + time * (0.05 + layer * 0.02)) *
                0.5 +
                0.5) *
              canvas.w;
            const py =
              (Math.cos(i * 311.7 + layer * 80 + time * (0.03 + layer * 0.01)) *
                0.5 +
                0.5) *
              canvas.h;
            const alpha =
              (Math.sin(time * 1.5 + i + layer) * 0.3 + 0.4) *
              (0.15 + layer * 0.05);
            ctx.fillStyle = `rgba(180,200,255,${alpha})`;
            ctx.beginPath();
            ctx.arc(px, py, 1 + layer * 0.3, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Layer 6: 生物荧光浮游生物（10 个带拖尾）
        for (let i = 0; i < 10; i++) {
          const bx = (Math.sin(i * 73.1 + time * 0.3) * 0.4 + 0.5) * canvas.w;
          const by = (Math.cos(i * 91.3 + time * 0.2) * 0.4 + 0.5) * canvas.h;
          const ba = Math.sin(time * 2 + i * 3) * 0.3 + 0.5;
          ctx.fillStyle = `rgba(0,255,204,${ba * 0.3})`;
          ctx.beginPath();
          ctx.arc(bx, by, 3, 0, Math.PI * 2);
          ctx.fill();
          // 拖尾
          for (let t = 1; t <= 4; t++) {
            const tx = bx - Math.cos(i * 73.1 + time * 0.3) * t * 8;
            const ty = by - Math.sin(i * 91.3 + time * 0.2) * t * 8;
            ctx.fillStyle = `rgba(0,255,204,${(ba * 0.1) / t})`;
            ctx.beginPath();
            ctx.arc(tx, ty, 2, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Layer 7: 知识图谱节点与边（深度排序）
        // 先画边
        ctx.lineWidth = 0.8;
        for (const e of edges) {
          if (!e.sourceNode || !e.targetNode) continue;
          const sp = cam.project(
            e.sourceNode.x,
            e.sourceNode.y,
            e.sourceNode.z,
          );
          const tp = cam.project(
            e.targetNode.x,
            e.targetNode.y,
            e.targetNode.z,
          );
          const alpha = Math.min(sp.scale, tp.scale) * 0.35;
          ctx.strokeStyle = `rgba(100,200,255,${alpha})`;
          ctx.beginPath();
          ctx.moveTo(sp.x, sp.y);
          ctx.lineTo(tp.x, tp.y);
          ctx.stroke();
          // 流动粒子
          const t = (time * 0.4 + e.sourceNode.x * 0.01) % 1;
          const px = sp.x + (tp.x - sp.x) * t,
            py = sp.y + (tp.y - sp.y) * t;
          ctx.fillStyle = `rgba(0,255,204,${alpha * 2})`;
          ctx.beginPath();
          ctx.arc(px, py, 1.5, 0, Math.PI * 2);
          ctx.fill();
          // 谓词标签（近处显示）
          if (sp.scale > 0.3 && e.predicate) {
            const mx = (sp.x + tp.x) / 2,
              my = (sp.y + tp.y) / 2;
            ctx.fillStyle = `rgba(0,255,204,${alpha * 1.5})`;
            ctx.font = `${Math.max(8, 10 * sp.scale)}px sans-serif`;
            ctx.textAlign = "center";
            ctx.fillText(e.predicate, mx, my - 4);
          }
        }

        // 按深度排序节点
        const sorted = nodes
          .map((n) => {
            const p = cam.project(n.x, n.y, n.z);
            return { ...n, px: p.x, py: p.y, ps: p.scale, pd: p.depth };
          })
          .sort((a, b) => b.pd - a.pd);

        for (const n of sorted) {
          const color = COLORS[n.label] || "#ffffff";
          const imp = n.importance || 5;
          const baseR = Math.min(imp * 2 + 3, 18) * n.ps;
          const isSelected = selected?.id === n.id;
          const isHover = hover?.id === n.id;
          const pulse = imp > 8 ? Math.sin(time * 3 + n.x) * 0.2 + 1 : 1;
          const r = baseR * pulse;

          // 外发光
          if (imp > 6 || isSelected || isHover) {
            const glowR = r * (isSelected ? 3.5 : 2.5);
            const glow = ctx.createRadialGradient(
              n.px,
              n.py,
              r * 0.5,
              n.px,
              n.py,
              glowR,
            );
            glow.addColorStop(0, color + "50");
            glow.addColorStop(1, color + "00");
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(n.px, n.py, glowR, 0, Math.PI * 2);
            ctx.fill();
          }

          // 节点
          ctx.globalAlpha = n.ps * 0.9;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(n.px, n.py, r, 0, Math.PI * 2);
          ctx.fill();
          // 内核高光
          ctx.fillStyle = "#ffffff";
          ctx.globalAlpha = n.ps * 0.4;
          ctx.beginPath();
          ctx.arc(n.px - r * 0.2, n.py - r * 0.2, r * 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;

          // 标签
          if (n.ps > 0.35 && r > 4) {
            ctx.fillStyle = `rgba(255,255,255,${n.ps * 0.85})`;
            ctx.font = `${Math.max(9, 11 * n.ps)}px sans-serif`;
            ctx.textAlign = "center";
            ctx.fillText(n.name, n.px, n.py + r + 13 * n.ps);
          }
        }

        requestAnimationFrame(draw);
      }

      // ==================== 数据加载 ====================
      async function api(path, opts = {}) {
        const res = await fetch(API + path, {
          headers: { "Content-Type": "application/json" },
          ...opts,
          body: opts.body ? JSON.stringify(opts.body) : undefined,
        });
        return res.json();
      }

      async function loadGraph() {
        try {
          const data = await api("/api/memory/graph-data");
          nodes = (data.nodes || []).map((n, i) => ({
            ...n,
            x: n.x || (Math.random() - 0.5) * 300,
            y: n.y || (n.degree || 1) * 15 - 50,
            z: n.z || (Math.random() - 0.5) * 300,
            vx: 0,
            vy: 0,
            vz: 0,
            importance: n.degree || 1,
          }));
          nodeMap = {};
          nodes.forEach((n) => (nodeMap[n.id] = n));
          edges = (data.edges || []).map((e) => ({
            ...e,
            sourceNode: nodeMap[e.source],
            targetNode: nodeMap[e.target],
          }));
          updateStatus(true);
        } catch (e) {
          updateStatus(false);
        }
      }

      async function loadStats() {
        try {
          const s = await api("/api/memory/stats");
          document.getElementById("s-quintuples").textContent =
            s.total_quintuples || 0;
          document.getElementById("s-entities").textContent =
            s.total_entities || 0;
          document.getElementById("s-access").textContent = s.total_access || 0;
          document.getElementById("s-local").textContent =
            s.local_backup_count || 0;
          updateStatus(s.connected);
        } catch {
          updateStatus(false);
        }
      }

      async function loadQuintuples() {
        // 侧栏五元组列表：调用 /api/memory/recent，渲染 主体—[谓词]→ 客体 卡片
        try {
          const list = await api("/api/memory/recent?limit=50");
          const container = document.getElementById("q-list");
          if (!list.length) {
            container.innerHTML =
              '<div style="text-align:center;padding:40px;color:var(--dim)">暂无五元组</div>';
            return;
          }
          container.innerHTML = list
            .map(
              (q) => `
      <div class="q-card">
        <div class="q-entity"><div class="q-dot" style="background:${COLORS[q.a_type] || "#fff"}"></div><span class="q-name">${q.a_name}</span><span class="q-type">${q.a_type}</span></div>
        <div class="q-predicate">—[${q.predicate}]→</div>
        <div class="q-entity"><div class="q-dot" style="background:${COLORS[q.b_type] || "#fff"}"></div><span class="q-name">${q.b_name}</span><span class="q-type">${q.b_type}</span></div>
      </div>`,
            )
            .join("");
        } catch {}
      }

      function updateStatus(ok) {
        document.getElementById("status-dot").className =
          "status-dot " + (ok ? "online" : "offline");
        document.getElementById("status-text").textContent = ok
          ? "已连接"
          : "连接断开";
      }

      // 搜索
      document.getElementById("search").addEventListener("input", (e) => {
        const q = e.target.value.toLowerCase();
        nodes.forEach((n) => (n._dim = q && !n.name.toLowerCase().includes(q)));
      });

      // 按钮
      document.getElementById("btn-refresh").addEventListener("click", () => {
        loadGraph();
        loadStats();
        loadQuintuples();
      });
      document.getElementById("btn-reset").addEventListener("click", () => {
        cam.theta = 0.5;
        cam.phi = 1.0;
        cam.radius = 600;
        selected = null;
      });

      // 添加五元组
      const overlay = document.getElementById("overlay"),
        addPanel = document.getElementById("add-panel");
      document.getElementById("btn-add").addEventListener("click", () => {
        overlay.style.display = "block";
        addPanel.style.display = "block";
      });
      document.getElementById("add-cancel").addEventListener("click", () => {
        overlay.style.display = "none";
        addPanel.style.display = "none";
      });
      document
        .getElementById("add-confirm")
        .addEventListener("click", async () => {
          const subj = document.getElementById("add-subj").value.trim();
          const pred = document.getElementById("add-pred").value.trim();
          const obj = document.getElementById("add-obj").value.trim();
          if (!subj || !pred || !obj) return;
          await api("/api/memory/add", {
            method: "POST",
            body: {
              subject: subj,
              subject_type: document.getElementById("add-subj-type").value,
              predicate: pred,
              object: obj,
              object_type: document.getElementById("add-obj-type").value,
            },
          });
          overlay.style.display = "none";
          addPanel.style.display = "none";
          document.getElementById("add-subj").value = "";
          document.getElementById("add-pred").value = "";
          document.getElementById("add-obj").value = "";
          loadGraph();
          loadStats();
          loadQuintuples();
        });

      // 初始化
      loadGraph();
      loadStats();
      loadQuintuples();
      draw();
      setInterval(loadStats, 30000);
      setInterval(() => {
        loadGraph();
        loadQuintuples();
      }, 60000);
    </script>
  </body>
</html>
